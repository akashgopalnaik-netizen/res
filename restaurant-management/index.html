<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Restaurant Management System</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="login-page">
  <div class="login-box">
    <h2>🍽️ RestoManager</h2>
    <p>Sign in to your account</p>

    <div class="role-tabs">
      <button class="role-tab active" onclick="setRole('admin', this)">Admin</button>
      <button class="role-tab" onclick="setRole('manager', this)">Manager</button>
      <button class="role-tab" onclick="setRole('customer', this)">Customer</button>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="Enter email" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password" />
    </div>
    <button class="btn btn-primary" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="loginError">Invalid email or password.</div>

    <div style="margin-top:20px; padding:14px; background:#f8f9fa; border-radius:8px; font-size:0.82rem; color:#666;">
      <strong>Demo Credentials:</strong><br/>
      Admin: admin@resto.com / admin123<br/>
      Manager: manager@resto.com / manager123<br/>
      Customer: customer@resto.com / customer123
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
  let selectedRole = 'admin';
  function setRole(role, el) {
    selectedRole = role;
    document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    const hints = { admin: 'admin@resto.com', manager: 'manager@resto.com', customer: 'customer@resto.com' };
    document.getElementById('email').value = hints[role];
    document.getElementById('password').value = '';
  }

  function doLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const user = login(email, password);
    if (!user) {
      document.getElementById('loginError').style.display = 'block';
      return;
    }
    if (user.role !== selectedRole) {
      document.getElementById('loginError').textContent = `This account is not a ${selectedRole}.`;
      document.getElementById('loginError').style.display = 'block';
      return;
    }
    const routes = { admin: 'admin/index.html', manager: 'manager/index.html', customer: 'customer/index.html' };
    window.location.href = routes[user.role];
  }

  document.getElementById('email').addEventListener('keydown', e => e.key === 'Enter' && doLogin());
  document.getElementById('password').addEventListener('keydown', e => e.key === 'Enter' && doLogin());
</script>
</body>
</html>
